<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">▲</span>
        <h1>Finwise</h1>
      </div>
      <span id="last-updated" class="last-updated">—</span>
    </div>

    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <span id="theme-icon">☀</span>
      </button>
    </div>
  </header>

  <!-- ── SEARCH BAR ── -->
  <div class="search-bar">
    <div class="search-inner">
      <input
        type="text"
        id="search-input"
        placeholder="Search symbol — try NVDA, NFLX, AMD…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="search-btn" onclick="searchStock()">Search</button>
    </div>
    <p class="powered-by">Powered by Finnhub</p>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <main class="container">

    <!-- Error Box -->
    <div id="error-box" class="error-msg" style="display:none;"></div>

    <!-- Search Result -->
    <section id="search-result" style="display:none;">
      <div class="section-header">
        <h2 class="section-title">Search Result</h2>
        <button class="close-btn" onclick="clearSearch()">✕ Clear</button>
      </div>
      <div id="search-result-cards" class="stocks-grid"></div>
    </section>

    <!-- Watchlist Controls -->
    <div class="section-header">
      <h2 class="section-title">Watchlist</h2>
      <div class="controls">

        <!-- Filter Dropdown -->
        <select id="filter-select" onchange="applyFiltersAndSort()">
          <option value="all">All</option>
          <option value="gainers">Gainers ▲</option>
          <option value="losers">Losers ▼</option>
        </select>

        <!-- Sort Dropdown -->
        <select id="sort-select" onchange="applyFiltersAndSort()">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price ↑</option>
          <option value="price-desc">Price ↓</option>
          <option value="change-asc">Change ↑</option>
          <option value="change-desc">Change ↓</option>
          <option value="name-asc">Name A–Z</option>
        </select>

        <!-- Refresh -->
        <button class="refresh-btn" onclick="loadWatchlist()">⟳ Refresh</button>
      </div>
    </div>

    <!-- Stocks Grid -->
    <div id="stocks-grid" class="stocks-grid">
      <p class="loading-text">Fetching market data<span class="dots"></span></p>
    </div>

  </main>

  <script src="app.js"></script>

</body>
</html>
